<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — CliffCircuit Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/portal/portal-common.css">
  <style>
    /* Layout: full-height chat below nav */
    #chat-app { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    #sidebar { width: 260px; min-width: 260px; border-right: 1px solid #1f2937; display: flex; flex-direction: column; background: #0a0f1a; }
    #sidebar-header { padding: 16px; border-bottom: 1px solid #1f2937; background: linear-gradient(to bottom, #0f1419, #0a0f1a); }
    #agent-list { flex: 1; overflow-y: auto; padding: 12px 8px; scroll-behavior: smooth; }
    #agent-list::-webkit-scrollbar { width: 4px; }
    #agent-list::-webkit-scrollbar-track { background: transparent; }
    #agent-list::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
    #agent-list::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    .agent-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
    .agent-item:hover { background: #111827; border-color: #1f2937; }
    .agent-item.active { background: #1e1b4b; border-color: #4f46e5; box-shadow: 0 0 8px rgba(79,70,229,0.15); }
    .agent-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; overflow: hidden; border: 2px solid transparent; transition: border-color 0.15s; }
    .agent-item:hover .agent-avatar { border-color: #1f2937; }
    .agent-item.active .agent-avatar { border-color: #4f46e5; }
    .agent-name { font-weight: 500; color: #e5e7eb; font-size: 14px; }
    .agent-model { font-size: 10px; color: #9ca3af; font-family: 'SF Mono', 'Fira Code', monospace; letter-spacing: 0.3px; }
    .agent-status-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
    .dot-online { background: #34d399; box-shadow: 0 0 6px #34d39966; }
    .dot-offline { background: #4b5563; }

    /* Session list under agent */
    .session-list { padding: 0 0 0 48px; }
    .session-item { padding: 8px 10px; font-size: 12px; color: #9ca3af; border-radius: 6px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all 0.15s; display: flex; justify-content: space-between; align-items: center; }
    .session-item:hover { background: #1f2937; color: #e5e7eb; }
    .session-item.active { background: #312e81; color: #a5b4fc; }
    .session-time { font-size: 10px; color: #6b7280; flex-shrink: 0; margin-left: 4px; }

    /* Main chat area */
    #chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #chat-header { padding: 14px 20px; border-bottom: 1px solid #1f2937; display: flex; align-items: center; gap: 12px; background: linear-gradient(to bottom, #0f1419, #0a0f1a); }
    #chat-header .agent-avatar { width: 32px; height: 32px; font-size: 16px; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }

    /* Messages */
    .msg-group { display: flex; gap: 10px; max-width: 80%; position: relative; }
    .msg-group:hover .msg-actions { opacity: 1; }
    .msg-group.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-group.assistant { align-self: flex-start; }
    .msg-group.continuation { margin-top: -2px; }
    .msg-group.continuation .msg-avatar { visibility: hidden; }
    .msg-group.continuation .msg-meta { display: none; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
    .msg-content { display: flex; flex-direction: column; gap: 2px; }
    .msg-meta { font-size: 12px; color: #9ca3af; display: flex; gap: 8px; align-items: center; padding: 2px 4px; font-weight: 400; }
    .msg-group.user .msg-meta { justify-content: flex-end; }
    .msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; }
    .msg-group.assistant .msg-bubble { background: #0f172a; color: #e2e8f0; border: 1px solid #0f2740; border-top-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .msg-group.user .msg-bubble { background: #312e81; color: #e0e7ff; border-top-right-radius: 4px; box-shadow: 0 2px 4px rgba(79,70,229,0.15); }

    /* Date separators */
    .date-separator { display: flex; align-items: center; gap: 16px; padding: 16px 0 8px; }
    .date-separator::before, .date-separator::after { content: ''; flex: 1; height: 1px; background: #1f2937; }
    .date-separator span { font-size: 11px; color: #6b7280; white-space: nowrap; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Collapsible long messages */
    .msg-bubble.collapsed { max-height: 200px; overflow: hidden; position: relative; }
    .msg-bubble.collapsed::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(transparent, #111827); pointer-events: none; }
    .msg-group.user .msg-bubble.collapsed::after { background: linear-gradient(transparent, #312e81); }
    .msg-expand-btn { font-size: 12px; color: #818cf8; cursor: pointer; padding: 6px 10px; display: inline-block; border: 1px solid #4f46e566; border-radius: 6px; background: #312e8166; margin-top: 4px; transition: all 0.15s; font-weight: 500; }
    .msg-expand-btn:hover { color: #a5b4fc; background: #312e81cc; border-color: #6366f1; box-shadow: 0 0 6px rgba(79,70,229,0.2); }

    /* Message hover actions */
    .msg-actions { position: absolute; right: -100px; top: 0; display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; pointer-events: none; z-index: 10; }
    .msg-group:hover .msg-actions { pointer-events: auto; }
    .msg-group.user .msg-actions { right: auto; left: -100px; }
    .msg-action-btn { width: 28px; height: 28px; border-radius: 6px; background: #1f2937; border: 1px solid #374151; color: #9ca3af; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 12px; }
    .msg-action-btn:hover { background: #374151; color: #e5e7eb; border-color: #4b5563; }
    .msg-action-btn.copied { background: #064e3b; color: #34d399; border-color: #059669; }

    /* Message appear animation */
    @keyframes msgAppear {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-group.new-msg { animation: msgAppear 0.2s ease-out; }

    /* Streaming bubble pulse */
    .msg-bubble.streaming { border-color: #4f46e5; }

    /* Header model tag */
    .model-tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; background: #1f2937; color: #9ca3af; margin-left: 6px; }

    /* Markdown in messages */
    .msg-bubble p { margin: 0 0 8px 0; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble code { background: #0d1117; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; color: #fbbf24; border: 1px solid #1f2937; }
    .msg-bubble pre { background: #0d1117; border: 1px solid #1e40af; border-radius: 8px; padding: 14px; margin: 8px 0; overflow-x: auto; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }
    .msg-bubble pre code { background: none; padding: 0; font-size: 12px; color: #e5e7eb; }
    .msg-bubble strong { font-weight: 700; color: #f9fafb; }
    .msg-bubble em { font-style: italic; color: #d1d5db; }
    .msg-bubble h1 { font-size: 18px; font-weight: 700; margin: 8px 0; color: #f9fafb; }
    .msg-bubble h2 { font-size: 16px; font-weight: 700; margin: 8px 0; color: #f3f4f6; }
    .msg-bubble h3 { font-size: 14px; font-weight: 700; margin: 6px 0; color: #f3f4f6; }
    .msg-bubble h4 { font-size: 13px; font-weight: 600; margin: 4px 0; color: #e5e7eb; }
    .msg-bubble a { color: #818cf8; text-decoration: underline; cursor: pointer; transition: color 0.15s; }
    .msg-bubble a:hover { color: #a5b4fc; }
    .msg-bubble ul, .msg-bubble ol { margin: 6px 0 8px 24px; padding: 0; }
    .msg-bubble li { margin-bottom: 4px; line-height: 1.6; color: #e2e8f0; }
    .msg-bubble img { max-width: 100%; border-radius: 8px; margin: 6px 0; cursor: pointer; }
    .msg-bubble blockquote { border-left: 3px solid #4f46e5; padding-left: 12px; margin: 8px 0; color: #cbd5e1; font-style: italic; background: rgba(79,70,229,0.05); padding: 8px 12px; border-radius: 4px; }

    /* Typing indicator */
    .typing-indicator { display: flex; align-items: center; gap: 10px; padding: 8px 20px; }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: #6366f1; animation: typingBounce 1.4s infinite ease-in-out; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }
    .typing-label { font-size: 12px; color: #6b7280; }

    /* Input area */
    #input-area { padding: 12px 20px 16px; border-top: 1px solid #1f2937; background: #0a0f1a; }
    #input-wrap { display: flex; align-items: flex-end; gap: 10px; background: #111827; border: 1px solid #1f2937; border-radius: 14px; padding: 8px 12px; transition: all 0.2s; }
    #input-wrap:hover { border-color: #374151; }
    #input-wrap:focus-within { border-color: #4f46e5; box-shadow: 0 0 0 1px #4f46e533; }
    #msg-input { flex: 1; background: transparent; border: none; outline: none; color: #e5e7eb; font-size: 14px; resize: none; max-height: 120px; line-height: 1.5; font-family: 'Inter', sans-serif; }
    #msg-input::placeholder { color: #6b7280; opacity: 0.8; }
    #send-btn { background: #4f46e5; color: white; border: none; border-radius: 10px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0; box-shadow: 0 2px 4px rgba(79,70,229,0.2); }
    #send-btn:hover { background: #6366f1; box-shadow: 0 4px 8px rgba(79,70,229,0.3); transform: translateY(-1px); }
    #send-btn:active { transform: translateY(0); box-shadow: 0 1px 2px rgba(79,70,229,0.2); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }
    #send-btn svg { width: 18px; height: 18px; }

    /* Image paste preview */
    .paste-preview { display: flex; gap: 8px; padding: 8px 0; flex-wrap: wrap; }
    .paste-thumb { position: relative; }
    .paste-thumb img { height: 60px; border-radius: 8px; border: 1px solid #374151; }
    .paste-thumb button { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* Image lightbox */
    #lightbox { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; cursor: pointer; }
    #lightbox.show { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

    /* Connection status */
    #conn-status { font-size: 11px; padding: 4px 10px; border-radius: 9999px; display: inline-flex; align-items: center; gap: 5px; }
    .conn-connected { background: #064e3b; color: #34d399; }
    .conn-connecting { background: #3b2800; color: #fbbf24; }
    .conn-disconnected { background: #450a0a; color: #f87171; }

    /* Empty state */
    #empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #4b5563; gap: 12px; }
    #empty-state .empty-icon { font-size: 48px; opacity: 0.3; }

    /* Scrollbar for messages */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

    /* Responsive */
    @media (max-width: 768px) {
      #sidebar { width: 200px; min-width: 200px; }
      .msg-group { max-width: 90%; }
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="portal" class="min-h-screen flex flex-col">
    <div id="portal-nav"></div>

    <div id="chat-app">
      <!-- Sidebar -->
      <div id="sidebar">
        <div id="sidebar-header">
          <div class="flex items-center justify-between">
            <span class="text-sm font-semibold text-white">Agents</span>
            <span id="conn-status" class="conn-disconnected">Offline</span>
          </div>
          <input id="agent-search" type="text" placeholder="Search..." style="width:100%;margin-top:8px;padding:6px 8px;border-radius:6px;border:1px solid #1f2937;background:#111827;color:#e5e7eb;font-size:12px;" />
        </div>
        <div id="agent-list">
          <div class="flex items-center justify-center h-32 text-gray-600 text-sm">Connecting...</div>
        </div>
      </div>

      <!-- Main chat -->
      <div id="chat-main">
        <div id="chat-header" style="display:none;">
          <div class="agent-avatar" id="header-avatar"></div>
          <div style="flex:1;">
            <div class="text-white font-medium text-sm" id="header-name"></div>
            <div class="text-gray-500 text-xs" id="header-model"></div>
          </div>
          <button id="clear-btn" title="Clear history" style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;transition:all 0.15s;" onmouseover="this.style.background='#1f2937';this.style.color='#e5e7eb'" onmouseout="this.style.background='none';this.style.color='#9ca3af'">Clear</button>
        </div>

        <div id="messages">
          <div id="empty-state">
            <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.15;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <div class="text-sm">Select an agent to start chatting</div>
          </div>
        </div>

        <!-- Typing indicator (hidden by default) -->
        <div id="typing-row" style="display:none;">
          <div class="typing-indicator">
            <div class="typing-dots"><span></span><span></span><span></span></div>
            <span class="typing-label" id="typing-label">is thinking...</span>
          </div>
        </div>

        <!-- Paste preview -->
        <div id="paste-preview" class="paste-preview" style="display:none; padding: 0 20px;"></div>

        <!-- Input -->
        <div id="input-area">
          <div id="input-wrap">
            <textarea id="msg-input" rows="1" placeholder="Type a message... (Cmd+Enter to send)" disabled></textarea>
            <button id="send-btn" disabled onclick="sendMessage()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox for images -->
  <div id="lightbox" onclick="this.classList.remove('show')"><img id="lightbox-img" src=""></div>

  <script src="/portal/auth.js?v=20260310a"></script>
  <script src="/portal/portal-common.js?v=20260310c"></script>
  <script>
  // ═══════════════════════════════════════════════════════════════
  //  CliffCircuit Portal — Chat
  // ═══════════════════════════════════════════════════════════════

  const PROXY_URL = 'wss://chat-proxy.cliffcircuit.ai';

  // State
  let ws = null;
  let wsReady = false;
  let msgIdCounter = 1;
  let pendingRPC = {};          // id → {resolve, reject, timeout}
  let agents = [];              // [{id, name, emoji, model, sessions:[]}]
  let activeAgent = null;       // agent id
  let activeSession = null;     // session key
  let isStreaming = false;
  let streamingBubble = null;   // DOM element being streamed into
  let streamBuffer = '';
  let pastedImages = [];        // [{dataUrl, file}]
  let reconnectDelay = 1000;

  // Agent colors for multi-agent distinction
  const AGENT_COLORS = ['#818cf8','#34d399','#f472b6','#fbbf24','#60a5fa','#a78bfa','#fb923c'];

  // Agent avatar images
  const AGENT_AVATARS = {
    main: '/portal/cliff-avatar.jpg',
    cliff: '/portal/cliff-avatar.jpg',
    samantha: '/portal/samantha-avatar.jpg',
    scout: '/portal/scout-avatar.jpg',
    atlas: '/portal/atlas-avatar.png',
    fernanda: '/portal/fernanda-avatar.jpg'
  };
  const USER_AVATAR = '/portal/tim-avatar.jpg';

  function avatarImg(agentId, size = 36) {
    const src = AGENT_AVATARS[agentId];
    if (src) return `<img src="${src}" alt="" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;">`;
    const color = agentColor(agentId);
    const name = agents.find(a => a.id === agentId)?.name || agentId;
    return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color}22;color:${color};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.5)}px;">${name.charAt(0).toUpperCase()}</div>`;
  }

  function agentColor(agentId) {
    const idx = agents.findIndex(a => a.id === agentId);
    return AGENT_COLORS[idx % AGENT_COLORS.length];
  }

  // ─── WebSocket Connection (via chat proxy) ────────────────────
  function getAuthToken() {
    // Portal uses Google OAuth — token stored in cc_google_auth
    try {
      const raw = localStorage.getItem('cc_google_auth');
      if (!raw) return null;
      const data = JSON.parse(raw);
      // Check expiry
      if (data.expiresAt && Date.now() > data.expiresAt) return null;
      return data.credential || data.email || null;
    } catch { return null; }
  }

  function connect() {
    setConnStatus('connecting');

    const token = getAuthToken();
    if (!token) {
      setConnStatus('disconnected');
      console.warn('[chat] No auth session found — not authenticated?');
      return;
    }

    const proxyUrl = PROXY_URL + '?token=' + encodeURIComponent(token);
    ws = new WebSocket(proxyUrl);

    ws.onopen = () => {
      // Proxy handles gateway auth — we're ready immediately on open
      wsReady = true;
      reconnectDelay = 1000;
      setConnStatus('connected');
      loadAgents();
    };

    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }

      // Proxy error events
      if (msg.type === 'event' && msg.event === 'proxy.error') {
        console.error('[chat] Proxy error:', msg.payload);
        return;
      }

      // RPC responses
      if (msg.type === 'res' && msg.id && pendingRPC[msg.id]) {
        const p = pendingRPC[msg.id];
        clearTimeout(p.timeout);
        delete pendingRPC[msg.id];
        if (msg.ok === false) p.reject(msg.error);
        else p.resolve(msg.payload ?? msg.result);
        return;
      }

      // Streaming chat events
      if (msg.type === 'event' && msg.event === 'chat') {
        handleChatEvent(msg.payload);
        return;
      }

      // Session events (for typing indicator)
      if (msg.type === 'event' && msg.event === 'session.updated') {
        return;
      }
    };

    ws.onclose = () => {
      wsReady = false;
      setConnStatus('disconnected');
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };

    ws.onerror = () => { ws.close(); };
  }

  function rpc(method, params = {}) {
    return new Promise((resolve, reject) => {
      if (!wsReady) return reject(new Error('Not connected'));
      const id = msgIdCounter++;
      const timeout = setTimeout(() => {
        delete pendingRPC[id];
        reject(new Error('RPC timeout'));
      }, 30000);
      pendingRPC[id] = { resolve, reject, timeout };
      ws.send(JSON.stringify({ type: 'req', id: String(id), method, params }));
    });
  }

  // ─── Connection Status Badge ─────────────────────────────────
  function setConnStatus(state) {
    const el = document.getElementById('conn-status');
    el.className = 'conn-' + state;
    el.textContent = state === 'connected' ? 'Connected' : state === 'connecting' ? 'Connecting...' : 'Offline';
  }

  // ─── Load Agents from Sessions ───────────────────────────────
  // Known agents — avoids needing sessions.list (operator.read scope)
  const KNOWN_AGENTS = [
    { id: 'main', name: 'Cliff', emoji: '', model: 'claude-opus-4-6' },
    { id: 'samantha', name: 'Samantha', emoji: '', model: 'claude-haiku-4-5' },
    { id: 'scout', name: 'Scout', emoji: '', model: 'claude-haiku-4-5' },
    { id: 'atlas', name: 'Atlas', emoji: '', model: 'claude-opus-4-6' },
    { id: 'fernanda', name: 'Fernanda', emoji: '', model: 'claude-sonnet-4-6' }
  ];

  async function loadAgents() {
    try {
      {
        // Use known agents directly (sessions.list requires operator.read scope)
        agents = KNOWN_AGENTS.map(a => ({
          ...a,
          sessions: [{ key: `agent:${a.id}:main`, label: 'Main', updatedAt: Date.now(), kind: 'direct' }]
        }));
      }

      renderAgentList();
    } catch (e) {
      console.error('Failed to load agents:', e);
      document.getElementById('agent-list').innerHTML = '<div class="text-red-400 text-xs p-4">Failed to load agents</div>';
    }
  }

  // ─── Render Sidebar ──────────────────────────────────────────
  function renderAgentList() {
    const container = document.getElementById('agent-list');
    if (!agents.length) {
      container.innerHTML = '<div class="text-gray-600 text-sm p-4 text-center">No agents found</div>';
      return;
    }

    let html = '';
    for (const agent of agents) {
      const isActive = activeAgent === agent.id;
      const color = agentColor(agent.id);
      html += `
        <div class="agent-item ${isActive ? 'active' : ''}" onclick="selectAgent('${agent.id}')">
          <div class="agent-avatar">${avatarImg(agent.id, 36)}</div>
          <div style="min-width:0;">
            <div class="agent-name">${agent.name}</div>
            <div class="agent-model">${shortModel(agent.model)}</div>
          </div>
          <div class="agent-status-dot dot-online"></div>
        </div>
      `;
      if (isActive && agent.sessions.length > 0) {
        html += '<div class="session-list">';
        // Sort sessions: most recent first
        const sorted = [...agent.sessions].sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
        for (const s of sorted.slice(0, 8)) {
          const sActive = activeSession === s.key;
          const label = s.label || s.key?.split(':').pop()?.slice(0, 12) || 'session';
          html += `<div class="session-item ${sActive ? 'active' : ''}" onclick="event.stopPropagation(); selectSession('${agent.id}', '${s.key}')" title="${s.key}">${label}</div>`;
        }
        html += '</div>';
      }
    }
    container.innerHTML = html;
  }

  function shortModel(model) {
    if (!model) return '';
    return model.replace('anthropic/', '').replace('claude-', '').replace(/-\d{4}.*/, '');
  }

  // ─── Select Agent / Session ──────────────────────────────────
  function selectAgent(agentId) {
    activeAgent = agentId;
    const agent = agents.find(a => a.id === agentId);
    if (!agent) return;

    // Auto-select most recent session
    const sorted = [...agent.sessions].sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
    if (sorted.length > 0) {
      selectSession(agentId, sorted[0].key);
    }
    renderAgentList();
  }

  function selectSession(agentId, sessionKey) {
    activeAgent = agentId;
    activeSession = sessionKey;
    const agent = agents.find(a => a.id === agentId);

    // Update header
    const header = document.getElementById('chat-header');
    header.style.display = 'flex';
    document.getElementById('header-avatar').innerHTML = avatarImg(agentId, 32);
    document.getElementById('header-name').textContent = agent?.name || agentId;
    document.getElementById('header-model').textContent = shortModel(agent?.model);

    // Enable input
    document.getElementById('msg-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();

    renderAgentList();
    loadHistory(sessionKey);
  }

  // ─── Load Chat History ───────────────────────────────────────
  async function loadHistory(sessionKey) {
    const messagesEl = document.getElementById('messages');
    messagesEl.innerHTML = '<div class="flex items-center justify-center h-32 text-gray-600 text-sm">Loading messages...</div>';

    try {
      const result = await rpc('chat.history', { sessionKey, limit: 50 });
      const messages = result?.messages || result || [];
      messagesEl.innerHTML = '';
      lastMsgRole = null;
      lastMsgDate = null;

      if (messages.length === 0) {
        messagesEl.innerHTML = '<div id="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.15;color:#6b7280;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><div class="text-sm text-gray-600">No messages yet. Say hello!</div></div>';
        return;
      }

      for (const msg of messages) {
        appendMessage(msg);
      }
      scrollToBottom();
    } catch (e) {
      console.error('Failed to load history:', e);
      messagesEl.innerHTML = '<div class="text-red-400 text-sm p-4 text-center">Failed to load history</div>';
    }
  }

  // Track last message for grouping
  let lastMsgRole = null;
  let lastMsgDate = null;

  // ─── Append Message to DOM ───────────────────────────────────
  function appendMessage(msg, streaming = false) {
    const messagesEl = document.getElementById('messages');
    // Remove empty state if present
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const role = msg.role || (msg.sender === 'user' ? 'user' : 'assistant');
    const isUser = role === 'user';
    const agent = agents.find(a => a.id === (msg.agentId || activeAgent));

    // Extract text content
    let text = '';
    if (Array.isArray(msg.content)) {
      text = msg.content
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n');
    } else {
      text = msg.content || msg.text || msg.message || '';
    }

    // Skip empty messages (tool_use only, thinking only, etc.)
    if (!text.trim() && !msg.attachments?.length && !streaming) return;

    // Clean up internal metadata from displayed text
    text = cleanMessageText(text);

    // Skip if cleaned text is empty
    if (!text.trim() && !msg.attachments?.length && !streaming) return;

    // Date separator
    const msgDate = msg.createdAt || msg.timestamp;
    if (msgDate) {
      const dateStr = new Date(msgDate).toDateString();
      if (dateStr !== lastMsgDate) {
        lastMsgDate = dateStr;
        const sep = document.createElement('div');
        sep.className = 'date-separator';
        const d = new Date(msgDate);
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        let label = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        if (dateStr === today) label = 'Today';
        else if (dateStr === yesterday) label = 'Yesterday';
        sep.innerHTML = `<span>${label}</span>`;
        messagesEl.appendChild(sep);
      }
    }

    // Check if this is a continuation (same sender, close in time)
    const isContinuation = (role === lastMsgRole) && !streaming;
    lastMsgRole = role;

    const group = document.createElement('div');
    group.className = `msg-group ${isUser ? 'user' : 'assistant'}${isContinuation ? ' continuation' : ''}`;

    // Avatar
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    if (isUser) {
      avatar.innerHTML = `<img src="${USER_AVATAR}" alt="" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">`;
    } else {
      avatar.innerHTML = avatarImg(agent?.id || activeAgent, 28);
    }

    // Content wrapper
    const content = document.createElement('div');
    content.className = 'msg-content';

    // Meta (name + time)
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const nameSpan = document.createElement('span');
    nameSpan.textContent = isUser ? 'You' : (agent?.name || 'Agent');
    meta.appendChild(nameSpan);
    if (msgDate) {
      const timeSpan = document.createElement('span');
      timeSpan.textContent = formatTime(msgDate);
      meta.appendChild(timeSpan);
    }

    // Bubble
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = renderMarkdown(text);

    // Collapse long messages
    const MSG_COLLAPSE_THRESHOLD = 400; // chars
    if (text.length > MSG_COLLAPSE_THRESHOLD && !streaming) {
      bubble.classList.add('collapsed');
      const expandBtn = document.createElement('span');
      expandBtn.className = 'msg-expand-btn';
      expandBtn.textContent = 'Show more';
      expandBtn.onclick = () => {
        if (bubble.classList.contains('collapsed')) {
          bubble.classList.remove('collapsed');
          expandBtn.textContent = 'Show less';
        } else {
          bubble.classList.add('collapsed');
          expandBtn.textContent = 'Show more';
        }
      };
      content.appendChild(meta);
      content.appendChild(bubble);
      content.appendChild(expandBtn);
    } else {
      content.appendChild(meta);
      content.appendChild(bubble);
    }

    // Handle images in message
    if (msg.attachments?.length) {
      for (const att of msg.attachments) {
        if (att.type?.startsWith('image') || att.url?.match(/\.(png|jpg|jpeg|gif|webp)/i)) {
          const img = document.createElement('img');
          img.src = att.url || att.dataUrl;
          img.onclick = () => openLightbox(img.src);
          bubble.appendChild(img);
        }
      }
    }

    group.appendChild(avatar);
    group.appendChild(content);

    // Add hover actions for copy
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const copyBtn = document.createElement('button');
    copyBtn.className = 'msg-action-btn';
    copyBtn.innerHTML = 'Copy';
    copyBtn.title = 'Copy message';
    copyBtn.onclick = async (e) => {
      e.stopPropagation();
      await navigator.clipboard.writeText(text);
      copyBtn.classList.add('copied');
      copyBtn.innerHTML = 'Done';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = 'Copy';
      }, 2000);
    };
    actions.appendChild(copyBtn);
    group.appendChild(actions);

    // Animate new real-time messages (not history loads)
    if (streaming || (lastMsgDate && !messagesEl.querySelector('.loading-history'))) {
      group.classList.add('new-msg');
    }

    messagesEl.appendChild(group);

    if (streaming) {
      streamingBubble = bubble;
      bubble.classList.add('streaming');
    }

    return bubble;
  }

  // ─── Clean Message Text ─────────────────────────────────────
  function cleanMessageText(text) {
    if (!text) return '';

    // Remove context percentage markers like [~34%] or (~34%)
    text = text.replace(/\[~?\d+%\]\s*/g, '');
    text = text.replace(/\(~?\d+%\)\s*/g, '');

    // Remove NO_REPLY responses
    if (text.trim() === 'NO_REPLY') return '';

    // Remove HEARTBEAT_OK responses
    if (text.trim() === 'HEARTBEAT_OK') return '';

    // Remove [[reply_to_current]] tags
    text = text.replace(/\[\[\s*reply_to[^\]]*\]\]\s*/g, '');

    // Remove session_status tool output blocks (OpenClaw status cards)
    text = text.replace(/🦞 OpenClaw[\s\S]*?(?=\n\n|$)/g, '').trim();

    // Remove raw JSON blobs (session objects, config dumps)
    if (text.startsWith('{') && text.endsWith('}') && text.length > 200) {
      try { JSON.parse(text); return ''; } catch {}
    }

    return text.trim();
  }

  // ─── Streaming Chat Events ───────────────────────────────────
  function handleChatEvent(payload) {
    if (!payload) return;
    const sk = payload.sessionKey;

    // Only handle events for the active session
    if (sk && sk !== activeSession) return;

    // Extract text from gateway message format: message.content is array of {type,text}
    const msgContent = payload.message?.content;
    let text = '';
    if (Array.isArray(msgContent)) {
      text = msgContent.filter(b => b.type === 'text').map(b => b.text).join('');
    } else if (typeof msgContent === 'string') {
      text = msgContent;
    }

    if (payload.state === 'delta' && text) {
      showTyping(false);
      if (!streamingBubble) {
        isStreaming = true;
        streamBuffer = '';
        appendMessage({ role: 'assistant', content: '' }, true);
      }
      // Gateway sends cumulative text, not incremental chunks
      streamBuffer = text;
      streamingBubble.innerHTML = renderMarkdown(streamBuffer);
      scrollToBottom();
    }

    if (payload.state === 'final') {
      if (text && !streamingBubble) {
        // Got final without any deltas — show the complete message
        appendMessage({ role: 'assistant', content: text });
        scrollToBottom();
      }
      if (streamingBubble) streamingBubble.classList.remove('streaming');
      isStreaming = false;
      streamingBubble = null;
      streamBuffer = '';
      showTyping(false);
    }

    // Thinking / processing state (before first delta)
    if (payload.state === 'delta' && !text) {
      showTyping(true, 'is thinking...');
    }
  }

  // ─── Send Message ────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text && pastedImages.length === 0) return;
    if (!activeSession) return;

    // Build message content
    let content = text;

    // Append image data if pasted
    const attachments = [];
    if (pastedImages.length > 0) {
      for (const img of pastedImages) {
        attachments.push({ type: 'image', dataUrl: img.dataUrl });
      }
    }

    // Show user message immediately
    appendMessage({
      role: 'user',
      content: text,
      attachments: attachments.length ? attachments : undefined,
      createdAt: new Date().toISOString()
    });
    scrollToBottom();

    // Clear input
    input.value = '';
    input.style.height = 'auto';
    clearPastedImages();

    // Show typing
    showTyping(true);

    // Send via WS
    try {
      const params = {
        sessionKey: activeSession,
        message: content,
        idempotencyKey: crypto.randomUUID()
      };
      // Note: image attachments would need base64 encoding in the message
      // For now, images are shown locally; gateway may need additional handling
      await rpc('chat.send', params);
    } catch (e) {
      console.error('Send failed:', e);
      showTyping(false);
      appendMessage({
        role: 'assistant',
        content: 'Failed to send message. Please try again.',
        createdAt: new Date().toISOString()
      });
    }
  }

  // ─── Typing Indicator ───────────────────────────────────────
  function showTyping(show, label) {
    const row = document.getElementById('typing-row');
    const labelEl = document.getElementById('typing-label');
    if (show) {
      if (label) labelEl.textContent = label;
      row.style.display = 'block';
      scrollToBottom();
    } else {
      row.style.display = 'none';
    }
  }

  // ─── Markdown Rendering (lightweight) ────────────────────────
  function renderMarkdown(text) {
    if (!text) return '';

    // Extract code blocks first to protect them from other transforms
    const codeBlocks = [];
    let processed = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      const idx = codeBlocks.length;
      codeBlocks.push(`<pre><code>${escapeHtml(code.trim())}</code></pre>`);
      return `%%CODEBLOCK_${idx}%%`;
    });

    let html = escapeHtml(processed);

    // Restore code blocks
    html = html.replace(/%%CODEBLOCK_(\d+)%%/g, (_, idx) => codeBlocks[parseInt(idx)]);

    // Headers
    html = html.replace(/^#{3} (.+)$/gm, '<strong style="font-size:14px;color:#f3f4f6;">$1</strong>');
    html = html.replace(/^#{2} (.+)$/gm, '<strong style="font-size:15px;color:#f3f4f6;">$1</strong>');
    html = html.replace(/^#{1} (.+)$/gm, '<strong style="font-size:16px;color:#f3f4f6;">$1</strong>');

    // Horizontal rules
    html = html.replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid #374151;margin:8px 0;">');

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Blockquotes
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // Ordered lists
    html = html.replace(/^(\d+)\. (.+)$/gm, '<li style="list-style:decimal;">$2</li>');

    // Unordered lists
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');

    // Wrap consecutive <li> in <ul>/<ol>
    html = html.replace(/((?:<li[^>]*>.*<\/li>\s*)+)/g, (match) => {
      if (match.includes('list-style:decimal')) return '<ol style="margin:4px 0 8px 20px;">' + match + '</ol>';
      return '<ul style="margin:4px 0 8px 20px;">' + match + '</ul>';
    });

    // Line breaks → paragraphs
    html = html.replace(/\n\n/g, '</p><p>');
    html = html.replace(/\n/g, '<br>');
    html = '<p>' + html + '</p>';
    html = html.replace(/<p><\/p>/g, '');

    return html;
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  // ─── Image Paste Support ─────────────────────────────────────
  document.addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;

    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        const reader = new FileReader();
        reader.onload = (ev) => {
          pastedImages.push({ dataUrl: ev.target.result, file });
          renderPastePreview();
        };
        reader.readAsDataURL(file);
      }
    }
  });

  function renderPastePreview() {
    const container = document.getElementById('paste-preview');
    if (pastedImages.length === 0) {
      container.style.display = 'none';
      container.innerHTML = '';
      return;
    }
    container.style.display = 'flex';
    container.innerHTML = pastedImages.map((img, i) => `
      <div class="paste-thumb">
        <img src="${img.dataUrl}">
        <button onclick="removePastedImage(${i})">x</button>
      </div>
    `).join('');
  }

  function removePastedImage(idx) {
    pastedImages.splice(idx, 1);
    renderPastePreview();
  }

  function clearPastedImages() {
    pastedImages = [];
    renderPastePreview();
  }

  // ─── Lightbox ────────────────────────────────────────────────
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('show');
  }

  // ─── Utilities ───────────────────────────────────────────────
  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    return isToday ? time : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + time;
  }

  function scrollToBottom() {
    const el = document.getElementById('messages');
    requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
  }

  // ─── Input Handling ──────────────────────────────────────────
  const msgInput = document.getElementById('msg-input');
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      sendMessage();
    }
    if (e.key === 'Escape') {
      msgInput.value = '';
      e.preventDefault();
    }
  });

  // Auto-resize textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });

  // Global keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // Cmd/Ctrl+K to focus input (if not in another input)
    if ((e.metaKey || e.ctrlKey) && e.key === 'k' && document.activeElement === document.body) {
      e.preventDefault();
      msgInput.focus();
    }
  });

  // Clear history button
  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (confirm('Clear all messages in this session? This cannot be undone.')) {
        const messagesEl = document.getElementById('messages');
        messagesEl.innerHTML = '';
        lastMsgDate = null;
        lastMsgRole = null;
        scrollToBottom();
      }
    });
  }

  // Agent search filter
  const agentSearch = document.getElementById('agent-search');
  if (agentSearch) {
    agentSearch.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const items = document.querySelectorAll('.agent-item');
      items.forEach(item => {
        const text = item.textContent.toLowerCase();
        item.style.display = text.includes(query) ? '' : 'none';
      });
    });
  }

  // ─── Init ────────────────────────────────────────────────────
  requireAuth();
  initPortal('chat');
  connect();
  </script>
</body>
</html>
