<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Watchlist — CliffCircuit Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/portal/portal-common.css">
  <style>
    .stat-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 1.25rem; }
    .wl-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .wl-table th { text-align: left; color: #6b7280; font-weight: 500; padding: 8px 12px; border-bottom: 1px solid #1f2937; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; }
    .wl-table th:hover { color: #9ca3af; }
    .wl-table th .sort-arrow { margin-left: 4px; font-size: 9px; }
    .wl-table td { padding: 8px 12px; border-bottom: 1px solid #111827; color: #d1d5db; }
    .wl-table tr.data-row { cursor: pointer; }
    .wl-table tr.data-row:hover { background: #1f2937; }
    .conviction-high { color: #4ade80; font-weight: 600; }
    .conviction-medium { color: #facc15; font-weight: 600; }
    .conviction-low { color: #6b7280; font-weight: 600; }
    .expand-row { background: #0d1117; }
    .expand-row td { padding: 16px 24px; border-bottom: 1px solid #1f2937; }
    .case-card { background: #111827; border: 1px solid #1f2937; border-radius: 8px; padding: 12px 16px; }
    .price-pos { color: #4ade80; }
    .price-neg { color: #f87171; }
    .news-item { border-left: 2px solid #1f2937; padding-left: 10px; margin-bottom: 8px; }
    .loading-pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  </style>
</head>
<body class="min-h-screen">
  <div id="portal" class="min-h-screen">
    <div id="portal-nav"></div>
    <div class="p-6 max-w-7xl mx-auto">

      <div class="mb-6">
        <h2 class="text-2xl font-bold text-white mb-1">AI Stock Watchlist</h2>
        <p class="text-gray-500 text-sm">Tracking AI infrastructure companies with strong moats and growth potential.</p>
      </div>

      <div id="last-updated" class="text-xs text-gray-500 mb-3" style="display:none;"></div>

      <!-- Summary Cards -->
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
        <div class="stat-card">
          <div class="text-gray-500 text-xs uppercase tracking-wide mb-1">Companies Tracked</div>
          <div class="text-2xl font-bold text-white" id="total-companies"><span class="loading-pulse">...</span></div>
        </div>
        <div class="stat-card">
          <div class="text-gray-500 text-xs uppercase tracking-wide mb-1">Sectors Covered</div>
          <div class="text-2xl font-bold text-white" id="sectors-covered"><span class="loading-pulse">...</span></div>
        </div>
        <div class="stat-card">
          <div class="text-gray-500 text-xs uppercase tracking-wide mb-1">Last Scan</div>
          <div class="text-2xl font-bold text-white" id="last-scan"><span class="loading-pulse">...</span></div>
        </div>
      </div>

      <!-- Conviction Filter -->
      <div class="flex gap-2 mb-4">
        <button class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-gray-800 text-gray-300 hover:bg-gray-700" data-filter="all">All</button>
        <button class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-gray-800 text-green-400 hover:bg-gray-700" data-filter="high">High Conviction</button>
        <button class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-gray-800 text-yellow-400 hover:bg-gray-700" data-filter="medium">Medium</button>
        <button class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-gray-800 text-gray-400 hover:bg-gray-700" data-filter="low">Low</button>
      </div>

      <!-- Watchlist Table -->
      <div class="card p-5">
        <div class="overflow-x-auto">
          <table class="wl-table" id="watchlist-table">
            <thead>
              <tr>
                <th data-sort="ticker">Ticker <span class="sort-arrow"></span></th>
                <th data-sort="name">Company <span class="sort-arrow"></span></th>
                <th data-sort="market_cap">Mkt Cap <span class="sort-arrow"></span></th>
                <th data-sort="sector">Sector <span class="sort-arrow"></span></th>
                <th data-sort="conviction">Conviction <span class="sort-arrow"></span></th>
                <th data-sort="moat">Moat <span class="sort-arrow"></span></th>
                <th data-sort="price_change">1D Change <span class="sort-arrow"></span></th>
                <th>News</th>
              </tr>
            </thead>
            <tbody id="watchlist-body">
              <tr><td colspan="8" class="text-gray-600 text-center py-4 loading-pulse">Loading watchlist...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="/portal/portal-common.js"></script>
  <script>
    let companies = [];
    let sortCol = 'conviction';
    let sortAsc = true;
    let filterConviction = 'all';
    let expandedTicker = null;

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function parseMktCap(s) {
      if (!s) return 0;
      const m = s.replace(/[$,]/g, '').match(/([\d.]+)\s*(T|B|M)?/i);
      if (!m) return 0;
      const n = parseFloat(m[1]);
      const u = (m[2] || '').toUpperCase();
      if (u === 'T') return n * 1e12;
      if (u === 'B') return n * 1e9;
      if (u === 'M') return n * 1e6;
      return n;
    }

    const convictionOrder = { high: 0, medium: 1, low: 2 };

    function sortCompanies(arr) {
      return [...arr].sort((a, b) => {
        let va, vb;
        switch (sortCol) {
          case 'ticker': va = a.ticker; vb = b.ticker; break;
          case 'name': va = a.name; vb = b.name; break;
          case 'market_cap': va = parseMktCap(a.market_cap); vb = parseMktCap(b.market_cap); return sortAsc ? va - vb : vb - va;
          case 'sector': va = a.sector; vb = b.sector; break;
          case 'conviction': va = convictionOrder[a.conviction] ?? 9; vb = convictionOrder[b.conviction] ?? 9; return sortAsc ? va - vb : vb - va;
          case 'price_change': va = a.price_change_1d ?? -999; vb = b.price_change_1d ?? -999; return sortAsc ? vb - va : va - vb;
          default: va = a.ticker; vb = b.ticker;
        }
        if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        return sortAsc ? va - vb : vb - va;
      });
    }

    function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || '—'); }

    function relativeTime(ts) {
      if (!ts) return 'Never';
      const diff = (Date.now() - new Date(ts).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function renderTable() {
      const filtered = filterConviction === 'all' ? companies : companies.filter(c => c.conviction === filterConviction);
      const sorted = sortCompanies(filtered);
      const body = document.getElementById('watchlist-body');

      body.innerHTML = sorted.map(c => {
        const convCls = `conviction-${c.conviction}`;
        const priceChange = c.price_change_1d != null
          ? `<span class="${c.price_change_1d >= 0 ? 'price-pos' : 'price-neg'}">${c.price_change_1d >= 0 ? '+' : ''}${c.price_change_1d.toFixed(2)}%</span>`
          : '<span class="text-gray-600">—</span>';
        const newsCount = (c.latest_news || []).length;
        const newsCol = newsCount > 0
          ? `<span class="text-cyan-400 text-xs">${newsCount} item${newsCount > 1 ? 's' : ''}</span>`
          : '<span class="text-gray-600 text-xs">—</span>';

        let row = `<tr class="data-row" data-ticker="${esc(c.ticker)}">
          <td class="font-mono font-semibold text-white">${esc(c.ticker)}</td>
          <td>${esc(c.name)}</td>
          <td class="text-gray-400">${esc(c.market_cap || '—')}</td>
          <td class="text-gray-400 text-xs">${esc(truncate(c.sector, 30))}</td>
          <td><span class="${convCls}">${c.conviction.charAt(0).toUpperCase() + c.conviction.slice(1)}</span></td>
          <td class="text-gray-400 text-xs">${esc(truncate(c.moat_summary, 60))}</td>
          <td>${priceChange}</td>
          <td>${newsCol}</td>
        </tr>`;

        if (expandedTicker === c.ticker) {
          row += `<tr class="expand-row"><td colspan="8">${renderExpanded(c)}</td></tr>`;
        }
        return row;
      }).join('');

      // Click handlers
      body.querySelectorAll('.data-row').forEach(tr => {
        tr.addEventListener('click', () => {
          const ticker = tr.dataset.ticker;
          expandedTicker = expandedTicker === ticker ? null : ticker;
          renderTable();
        });
      });
    }

    function renderExpanded(c) {
      const priceInfo = c.price_current != null
        ? `<div class="text-white text-lg font-bold">$${c.price_current.toFixed(2)}
            ${c.price_change_1d != null ? `<span class="${c.price_change_1d >= 0 ? 'price-pos' : 'price-neg'} text-sm ml-2">${c.price_change_1d >= 0 ? '+' : ''}${c.price_change_1d.toFixed(2)}%</span>` : ''}
           </div>`
        : '';

      const metrics = [
        c.revenue_ttm ? `Revenue: ${c.revenue_ttm}` : null,
        c.revenue_growth_yoy ? `Growth: ${c.revenue_growth_yoy}` : null,
        c.forward_pe ? `Fwd P/E: ${c.forward_pe}x` : null,
        c.analyst_consensus ? `Consensus: ${c.analyst_consensus}` : null,
        c.price_target_avg ? `PT Avg: ${c.price_target_avg}` : null,
      ].filter(Boolean).map(m => `<span class="inline-block bg-gray-800 text-gray-300 text-xs px-2 py-1 rounded mr-2 mb-1">${m}</span>`).join('');

      const news = (c.latest_news || []).map(n =>
        `<div class="news-item">
          <div class="text-sm text-white">${esc(n.title || n.headline || '')}</div>
          <div class="text-xs text-gray-500">${esc(n.source || '')} ${n.date ? '· ' + n.date : ''}</div>
        </div>`
      ).join('') || '<div class="text-gray-600 text-sm">No recent news</div>';

      return `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            ${priceInfo}
            <div class="mt-2 mb-3">${metrics}</div>
            <div class="case-card mb-3">
              <div class="text-green-400 text-xs uppercase font-semibold mb-1">🐂 Bull Case</div>
              <div class="text-gray-300 text-sm">${esc(c.bull_case || '—')}</div>
            </div>
            <div class="case-card">
              <div class="text-red-400 text-xs uppercase font-semibold mb-1">🐻 Bear Case</div>
              <div class="text-gray-300 text-sm">${esc(c.bear_case || '—')}</div>
            </div>
          </div>
          <div>
            <div class="text-gray-500 text-xs uppercase font-semibold mb-2">Latest News</div>
            ${news}
            <div class="case-card mt-3">
              <div class="text-cyan-400 text-xs uppercase font-semibold mb-1">Moat</div>
              <div class="text-gray-300 text-sm">${esc(c.moat_summary || '—')}</div>
            </div>
          </div>
        </div>`;
    }

    // Sort click handlers
    document.querySelectorAll('.wl-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        renderTable();
      });
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filterConviction = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('ring-1', 'ring-gray-500'));
        btn.classList.add('ring-1', 'ring-gray-500');
        renderTable();
      });
    });

    async function loadWatchlist() {
      try {
        const res = await fetch('watchlist-data.json?t=' + Date.now());
        if (!res.ok) throw new Error('not found');
        const data = await res.json();

        document.getElementById('total-companies').textContent = data.metadata.total_companies;
        document.getElementById('sectors-covered').textContent = data.metadata.sectors_covered;
        document.getElementById('last-scan').textContent = data.metadata.last_scan ? relativeTime(data.metadata.last_scan) : 'Not yet scanned';

        if (data.metadata.last_scan) {
          const el = document.getElementById('last-updated');
          el.style.display = 'block';
          el.textContent = '🕐 Last scan: ' + relativeTime(data.metadata.last_scan);
        }

        companies = data.companies;
        renderTable();
      } catch (e) {
        console.error('Watchlist error:', e);
        document.getElementById('watchlist-body').innerHTML = '<tr><td colspan="8" class="text-red-400 text-center py-4">Error: ' + esc(e.message) + '</td></tr>';
      }
    }

    (async () => {
      // Check auth first (fast, sync localStorage check)
      if (localStorage.getItem('cc_auth') !== '1') {
        window.location.href = '/portal/';
        return;
      }
      // Render nav immediately
      if (typeof renderNav === 'function') renderNav('watchlist');
      // Load watchlist data — don't wait for gateway health/sessions
      try {
        await loadWatchlist();
      } catch(e) { console.error('Watchlist load error:', e); }
      setInterval(loadWatchlist, 300000);
      // Init gateway polling in background (non-blocking)
      initPortal('watchlist').catch(() => {});
    })();
  </script>
</body>
</html>
