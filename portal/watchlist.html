<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Watchlist — CliffCircuit Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/portal/portal-common.css">
  <style>
    .stat-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 1.25rem; }
    .wl-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .wl-table th { text-align: left; color: #6b7280; font-weight: 500; padding: 8px 12px; border-bottom: 1px solid #1f2937; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; }
    .wl-table th:hover { color: #9ca3af; }
    .wl-table th .sort-arrow { margin-left: 4px; font-size: 9px; }
    .wl-table td { padding: 8px 12px; border-bottom: 1px solid #111827; color: #d1d5db; }
    .wl-table tr.data-row { cursor: pointer; }
    .wl-table tr.data-row:hover { background: #1f2937; }
    .conviction-high { color: #4ade80; font-weight: 600; }
    .conviction-medium { color: #facc15; font-weight: 600; }
    .conviction-low { color: #6b7280; font-weight: 600; }
    .expand-row { background: #0d1117; }
    .expand-row td { padding: 16px 24px; border-bottom: 1px solid #1f2937; }
    .case-card { background: #111827; border: 1px solid #1f2937; border-radius: 8px; padding: 12px 16px; }
    .price-pos { color: #4ade80; }
    .price-neg { color: #f87171; }
    .news-item { border-left: 2px solid #1f2937; padding-left: 10px; margin-bottom: 8px; }
    .loading-pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  </style>
</head>
<body class="min-h-screen">
  <div id="portal" class="min-h-screen">
    <div id="portal-nav"></div>
    <div class="p-6 max-w-7xl mx-auto">

      <div class="mb-6">
        <h2 class="text-2xl font-bold text-white mb-1">AI Stock Watchlist</h2>
        <p class="text-gray-500 text-sm">Tracking AI infrastructure companies with strong moats and growth potential.</p>
      </div>

      <div id="last-updated" class="text-xs text-gray-500 mb-3" style="display:none;"></div>

      <!-- Summary Cards -->
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
        <div class="stat-card">
          <div class="text-gray-500 text-xs uppercase tracking-wide mb-1">Companies Tracked</div>
          <div class="text-2xl font-bold text-white" id="total-companies"><span class="loading-pulse">...</span></div>
        </div>
        <div class="stat-card">
          <div class="text-gray-500 text-xs uppercase tracking-wide mb-1">Sectors Covered</div>
          <div class="text-2xl font-bold text-white" id="sectors-covered"><span class="loading-pulse">...</span></div>
        </div>
        <div class="stat-card">
          <div class="text-gray-500 text-xs uppercase tracking-wide mb-1">Last Scan</div>
          <div class="text-2xl font-bold text-white" id="last-scan"><span class="loading-pulse">...</span></div>
        </div>
      </div>

      <!-- Conviction Filter -->
      <div class="flex gap-2 mb-4">
        <button class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-gray-800 text-gray-300 hover:bg-gray-700" data-filter="all">All</button>
        <button class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-gray-800 text-green-400 hover:bg-gray-700" data-filter="high">High Conviction</button>
        <button class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-gray-800 text-yellow-400 hover:bg-gray-700" data-filter="medium">Medium</button>
        <button class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-gray-800 text-gray-400 hover:bg-gray-700" data-filter="low">Low</button>
      </div>

      <!-- Watchlist Table -->
      <div class="card p-5">
        <div class="overflow-x-auto">
          <table class="wl-table" id="watchlist-table">
            <thead>
              <tr>
                <th data-sort="ticker">Ticker <span class="sort-arrow"></span></th>
                <th data-sort="name">Company <span class="sort-arrow"></span></th>
                <th data-sort="market_cap">Mkt Cap <span class="sort-arrow"></span></th>
                <th data-sort="sector">Sector <span class="sort-arrow"></span></th>
                <th data-sort="conviction">Conviction <span class="sort-arrow"></span></th>
                <th data-sort="moat">Moat <span class="sort-arrow"></span></th>
                <th data-sort="price">Price <span class="sort-arrow"></span></th>
                <th data-sort="pe">P/E <span class="sort-arrow"></span></th>
                <th data-sort="price_change">1D Change <span class="sort-arrow"></span></th>
                <th>News</th>
              </tr>
            </thead>
            <tbody id="watchlist-body">
              <tr><td colspan="11" class="text-gray-600 text-center py-4 loading-pulse">Loading watchlist...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="/portal/portal-common.js"></script>
  <script>
    let companies = [];
    let sortCol = 'conviction';
    let sortAsc = true;
    let filterConviction = 'all';
    let expandedTicker = null;

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function sentimentDot(sent) {
      if (!sent) return '';
      const colors = { positive: '#22c55e', negative: '#ef4444', neutral: '#9ca3af' };
      const c = colors[(sent||'').toLowerCase()] || '#9ca3af';
      return `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${c};margin-right:5px;margin-top:5px;flex-shrink:0"></span>`;
    }

    function parseMktCap(s) {
      if (!s) return 0;
      const m = s.replace(/[$,]/g, '').match(/([\d.]+)\s*(T|B|M)?/i);
      if (!m) return 0;
      const n = parseFloat(m[1]);
      const u = (m[2] || '').toUpperCase();
      if (u === 'T') return n * 1e12;
      if (u === 'B') return n * 1e9;
      if (u === 'M') return n * 1e6;
      return n;
    }

    const convictionOrder = { high: 0, medium: 1, low: 2 };

    function sortCompanies(arr) {
      return [...arr].sort((a, b) => {
        let va, vb;
        switch (sortCol) {
          case 'ticker': va = a.ticker; vb = b.ticker; break;
          case 'name': va = a.name; vb = b.name; break;
          case 'market_cap': va = parseMktCap(a.market_cap); vb = parseMktCap(b.market_cap); return sortAsc ? va - vb : vb - va;
          case 'sector': va = a.sector; vb = b.sector; break;
          case 'conviction': va = convictionOrder[a.conviction] ?? 9; vb = convictionOrder[b.conviction] ?? 9; return sortAsc ? va - vb : vb - va;
          case 'price': va = a.price_current ?? 0; vb = b.price_current ?? 0; return sortAsc ? va - vb : vb - va;
          case 'pe': va = a.pe_ratio ?? 9999; vb = b.pe_ratio ?? 9999; return sortAsc ? va - vb : vb - va;
          case 'price_change': va = a.price_change_1d ?? -999; vb = b.price_change_1d ?? -999; return sortAsc ? vb - va : va - vb;
          default: va = a.ticker; vb = b.ticker;
        }
        if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        return sortAsc ? va - vb : vb - va;
      });
    }

    function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || '—'); }

    function relativeTime(ts) {
      if (!ts) return 'Never';
      const diff = (Date.now() - new Date(ts).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function renderTable() {
      const filtered = filterConviction === 'all' ? companies : companies.filter(c => c.conviction === filterConviction);
      const sorted = sortCompanies(filtered);
      const body = document.getElementById('watchlist-body');

      body.innerHTML = sorted.map(c => {
        const convCls = `conviction-${c.conviction}`;
        const priceChange = c.price_change_1d != null
          ? `<span class="${c.price_change_1d >= 0 ? 'price-pos' : 'price-neg'}">${c.price_change_1d >= 0 ? '+' : ''}${c.price_change_1d.toFixed(2)}%</span>`
          : '<span class="text-gray-600">—</span>';
        const newsCount = (c.latest_news || []).length;
        const newsCol = newsCount > 0
          ? `<span class="text-cyan-400 text-xs">${newsCount} item${newsCount > 1 ? 's' : ''}</span>`
          : '<span class="text-gray-600 text-xs">—</span>';

        let row = `<tr class="data-row" data-ticker="${esc(c.ticker)}">
          <td class="font-mono font-semibold text-white">${esc(c.ticker)}</td>
          <td>${esc(c.name)}</td>
          <td class="text-gray-400">${esc(c.market_cap || '—')}</td>
          <td class="text-gray-400 text-xs">${esc(truncate(c.sector, 30))}</td>
          <td><span class="${convCls}">${c.conviction.charAt(0).toUpperCase() + c.conviction.slice(1)}</span></td>
          <td class="text-gray-400 text-xs">${esc(truncate(c.moat_summary, 60))}</td>
          <td class="text-gray-400">${c.price_current != null ? '$' + c.price_current.toFixed(2) : '—'}</td>
          <td class="text-gray-400">${c.pe_ratio != null && c.pe_ratio > 0 ? Math.round(c.pe_ratio) + 'x' : 'N/A'}</td>
          <td>${priceChange}</td>
          <td>${newsCol}</td>
        </tr>`;

        if (expandedTicker === c.ticker) {
          row += `<tr class="expand-row"><td colspan="11">${renderExpanded(c)}</td></tr>`;
        }
        return row;
      }).join('');

      // Click handlers
      body.querySelectorAll('.data-row').forEach(tr => {
        tr.addEventListener('click', () => {
          const ticker = tr.dataset.ticker;
          expandedTicker = expandedTicker === ticker ? null : ticker;
          renderTable();
        });
      });
    }

    function renderScores(c) {
      const s = c.scores || {};

      // ── Technical ──
      const techVerdictMap = {
        'strong buy': ['text-green-300', '⬆⬆', 'Strong Buy'],
        'buy':        ['text-green-400', '⬆',  'Buy'],
        'hold':       ['text-yellow-400','➡',  'Hold'],
        'sell':       ['text-red-400',   '⬇',  'Sell'],
        'strong sell':['text-red-300',   '⬇⬇', 'Strong Sell'],
        'neutral':    ['text-gray-400',  '—',  'Neutral'],
      };
      const [techCls, techIcon, techLabel] = techVerdictMap[s.technical] || techVerdictMap['neutral'];
      const rsi   = s.rsi   != null ? `RSI ${s.rsi}` : null;
      const macd  = s.macd_direction  ? `MACD ${s.macd_direction}` : null;
      const smaCross = s.sma_cross    ? `SMA ${s.sma_cross}` : null;

      // ── News Sentiment ──
      const sentVerdictMap = {
        'positive': ['text-green-400', '😊', 'Positive'],
        'negative': ['text-red-400',   '😟', 'Negative'],
        'neutral':  ['text-gray-400',  '😐', 'Neutral'],
      };
      const [sentCls, sentIcon, sentLabel] = sentVerdictMap[s.news_sentiment] || sentVerdictMap['neutral'];
      // Count article sentiments from latest_news
      const newsItems = c.latest_news || [];
      const sentCounts = {positive: 0, negative: 0, neutral: 0};
      newsItems.forEach(n => { const k = (n.sentiment||'neutral').toLowerCase(); sentCounts[k] = (sentCounts[k]||0)+1; });
      const sentCountsLine = newsItems.length
        ? `<span class="text-green-500">+${sentCounts.positive}</span> / <span class="text-gray-500">${sentCounts.neutral}</span> / <span class="text-red-500">-${sentCounts.negative}</span> articles`
        : 'No articles';

      // ── Social Sentiment ──
      const soc = c.social || {};
      const buzz = (soc.social_buzz || s.social_buzz || 'low').toLowerCase();
      // Derive social verdict from buzz level
      const socialVerdictMap = {
        'viral':  ['text-green-300', '🔥', 'Viral'],
        'high':   ['text-green-400', '🚀', 'Bullish'],
        'medium': ['text-yellow-400','⚡',  'Neutral'],
        'low':    ['text-red-400',   '📉', 'Bearish'],
      };
      const [socialCls, socialIcon, socialLabel] = socialVerdictMap[buzz] || socialVerdictMap['low'];

      const redditMentions = soc.reddit_mentions_7d ?? s.reddit_mentions_7d ?? null;
      const redditUpvotes  = soc.reddit_avg_upvotes ?? s.reddit_avg_upvotes ?? null;
      const redditLine = redditMentions !== null
        ? `${redditMentions} mentions · ~${redditUpvotes} avg ↑`
        : 'No data';
      const stLine  = soc.stocktwits_bullish_pct != null
        ? `${Math.round(soc.stocktwits_bullish_pct * 100)}% bull · ${soc.stocktwits_messages||0} msgs`
        : 'No data';
      const twLine  = soc.twitter_tweet_count != null
        ? `${soc.twitter_tweet_count} tweets · ${soc.twitter_engagement||'?'} eng`
        : 'No data';

      return `<div class="case-card mt-3">
        <div class="text-purple-400 text-xs uppercase font-semibold mb-2">📊 Market Pulse</div>
        <div class="grid grid-cols-3 gap-3">
          <!-- Technical -->
          <div class="bg-gray-900 rounded-lg p-3 text-center">
            <div class="text-gray-500 text-xs uppercase tracking-wide mb-2">Technical</div>
            <div class="${techCls} text-lg font-bold mb-1">${techIcon} ${techLabel}</div>
            <div class="space-y-1 mt-2">
              ${rsi      ? `<div class="text-gray-400 text-xs">${rsi}</div>` : ''}
              ${macd     ? `<div class="text-gray-400 text-xs">${macd}</div>` : ''}
              ${smaCross ? `<div class="text-gray-400 text-xs">${smaCross}</div>` : ''}
              ${!rsi && !macd && !smaCross ? '<div class="text-gray-600 text-xs">No sub-details</div>' : ''}
            </div>
          </div>
          <!-- News Sentiment -->
          <div class="bg-gray-900 rounded-lg p-3 text-center">
            <div class="text-gray-500 text-xs uppercase tracking-wide mb-2">News Sentiment</div>
            <div class="${sentCls} text-lg font-bold mb-1">${sentIcon} ${sentLabel}</div>
            <div class="text-xs text-gray-400 mt-2">${sentCountsLine}</div>
          </div>
          <!-- Social Sentiment -->
          <div class="bg-gray-900 rounded-lg p-3 text-center">
            <div class="text-gray-500 text-xs uppercase tracking-wide mb-2">Social Sentiment</div>
            <div class="${socialCls} text-lg font-bold mb-2">${socialIcon} ${socialLabel}</div>
            <div class="text-left" style="display:flex;flex-direction:column;gap:6px">
              <div class="text-xs">
                <div class="text-gray-500 mb-0.5">Reddit</div>
                <div class="text-gray-300">${redditLine}</div>
              </div>
              <div class="text-xs">
                <div class="text-gray-500 mb-0.5">StockTwits</div>
                <div class="text-gray-${stLine === 'No data' ? '600' : '300'}">${stLine}</div>
              </div>
              <div class="text-xs">
                <div class="text-gray-500 mb-0.5">Twitter/X</div>
                <div class="text-gray-${twLine === 'No data' ? '600' : '300'}">${twLine}</div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }

    function renderExpanded(c) {
      const metrics = [
        c.revenue_ttm ? `Revenue: ${c.revenue_ttm}` : null,
        c.revenue_growth_yoy ? `Growth: ${c.revenue_growth_yoy}` : null,
        c.forward_pe ? `Fwd P/E: ${c.forward_pe}x` : null,
        c.analyst_consensus ? `Consensus: ${c.analyst_consensus}` : null,
        c.price_target_avg ? `PT Avg: ${c.price_target_avg}` : null,
      ].filter(Boolean).map(m => `<span class="inline-block bg-gray-800 text-gray-300 text-xs px-2 py-1 rounded mr-2">${m}</span>`).join('');

      const allNews = c.latest_news || [];
      const showMore = allNews.length > 3;
      const newsId = `news-more-${esc(c.ticker)}`;
      const newsHtml = (items, hidden) => items.map(n => {
        const title = esc(n.title || n.headline || '');
        const titleEl = n.url
          ? `<a href="${esc(n.url)}" target="_blank" rel="noopener" class="text-sm text-white hover:text-cyan-400 underline decoration-dotted">${title}</a>`
          : `<div class="text-sm text-white">${title}</div>`;
        const dot = sentimentDot(n.sentiment);
        return `<div class="news-item${hidden ? ' hidden' : ''}">
          <div style="display:flex;align-items:flex-start">${dot}<div style="flex:1">${titleEl}
          <div class="text-xs text-gray-500">${esc(n.source || '')} ${n.date ? '· ' + n.date : ''}${n.sentiment ? ' · <span style="color:' + (n.sentiment==='positive'?'#22c55e':n.sentiment==='negative'?'#ef4444':'#9ca3af') + '">' + n.sentiment + '</span>' : ''}</div></div></div>
        </div>`;
      }).join('');
      const news = allNews.length
        ? newsHtml(allNews.slice(0, 3), false) +
          (showMore
            ? `<div id="${newsId}" style="display:none">${newsHtml(allNews.slice(3), false)}</div>
               <button onclick="var el=document.getElementById('${newsId}');var btn=this;if(el.style.display==='none'){el.style.display='';btn.textContent='Less ↑';}else{el.style.display='none';btn.textContent='More →';}" class="text-cyan-500 text-xs hover:text-cyan-300 mt-1" style="display:block;padding-left:12px">More →</button>`
            : '')
        : '<div class="text-gray-600 text-sm">No recent news</div>';

      // nameAndPrice is now rendered inline in the return template

      return `
        <div class="flex items-baseline justify-between mb-3">
          <div>
            <span class="text-white text-base font-semibold">${esc(c.company || c.name || c.ticker)}</span>
            <span class="text-gray-500 text-sm ml-2">${esc(c.ticker)}</span>
          </div>
          ${c.price_current != null ? `<div class="text-white text-lg font-bold">$${c.price_current.toFixed(2)}${c.price_change_1d != null ? ` <span class="${c.price_change_1d >= 0 ? 'price-pos' : 'price-neg'} text-sm">${c.price_change_1d >= 0 ? '+' : ''}${c.price_change_1d.toFixed(2)}%</span>` : ''}</div>` : ''}
        </div>
        <div class="mb-3" style="white-space:nowrap;overflow-x:auto">${metrics}</div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <div class="case-card mb-3">
              <div class="text-cyan-400 text-xs uppercase font-semibold mb-1">Moat</div>
              <div class="text-gray-300 text-sm">${esc(c.moat_summary || '—')}</div>
            </div>
            <div class="case-card mb-3">
              <div class="text-green-400 text-xs uppercase font-semibold mb-1">🐂 Bull Case</div>
              <div class="text-gray-300 text-sm">${esc(c.bull_case || '—')}</div>
            </div>
            <div class="case-card">
              <div class="text-red-400 text-xs uppercase font-semibold mb-1">🐻 Bear Case</div>
              <div class="text-gray-300 text-sm">${esc(c.bear_case || '—')}</div>
            </div>
          </div>
          <div>
            <div class="text-gray-500 text-xs uppercase font-semibold mb-2" style="padding-left:12px">Latest News</div>
            ${news}
            ${renderScores(c)}
          </div>
        </div>`;
    }

    // Sort click handlers
    document.querySelectorAll('.wl-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        renderTable();
      });
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filterConviction = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('ring-1', 'ring-gray-500'));
        btn.classList.add('ring-1', 'ring-gray-500');
        renderTable();
      });
    });

    async function loadWatchlist() {
      try {
        const res = await fetch('watchlist-data.json?t=' + Date.now());
        if (!res.ok) throw new Error('not found');
        const data = await res.json();

        document.getElementById('total-companies').textContent = data.metadata.total_companies;
        document.getElementById('sectors-covered').textContent = data.metadata.sectors_covered;
        document.getElementById('last-scan').textContent = data.metadata.last_scan ? relativeTime(data.metadata.last_scan) : 'Not yet scanned';

        if (data.metadata.last_scan) {
          const el = document.getElementById('last-updated');
          el.style.display = 'block';
          el.textContent = '🕐 Last scan: ' + relativeTime(data.metadata.last_scan);
        }

        companies = data.companies;
        renderTable();
      } catch (e) {
        console.error('Watchlist error:', e);
        document.getElementById('watchlist-body').innerHTML = '<tr><td colspan="11" class="text-red-400 text-center py-4">Error: ' + esc(e.message) + '</td></tr>';
      }
    }

    (async () => {
      // Check auth first (fast, sync localStorage check)
      if (localStorage.getItem('cc_auth') !== '1') {
        window.location.href = '/portal/';
        return;
      }
      // Render nav immediately
      if (typeof renderNav === 'function') renderNav('watchlist');
      // Load watchlist data — don't wait for gateway health/sessions
      try {
        await loadWatchlist();
      } catch(e) { console.error('Watchlist load error:', e); }
      setInterval(loadWatchlist, 300000);
      // Init gateway polling in background (non-blocking)
      initPortal('watchlist').catch(() => {});
    })();
  </script>
</body>
</html>
